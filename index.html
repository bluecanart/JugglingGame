<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juggle.io — A Juggling Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">●&nbsp;●&nbsp;●</span>
          <h1>Juggle.io</h1>
          <span class="brand-sub">a juggling sandbox</span>
        </div>
        <div class="controls">
          <label class="control">
            <span>Balls</span>
            <select id="ball-count">
              <option>1</option><option>2</option><option selected>3</option>
              <option>4</option><option>5</option><option>6</option>
              <option>7</option><option>8</option><option>9</option>
            </select>
          </label>
          <label class="control">
            <span>Speed</span>
            <select id="speed">
              <option value="0.25">1/4x</option>
              <option value="0.5">1/2x</option>
              <option value="0.75">3/4x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
            </select>
          </label>
          <label class="control">
            <span>Palette</span>
            <select id="palette">
              <option value="multi" selected>Multicolor</option>
              <option value="orange">Orange</option>
              <option value="red">Red</option>
              <option value="yellow">Yellow</option>
              <option value="green">Green</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
              <option value="pink">Pink</option>
              <option value="white">White</option>
              <option value="black">Black</option>
              <option value="one-red">One Red / Others White</option>
            </select>
          </label>
        </div>
      </header>

      <section class="stage">
        <canvas id="stage"></canvas>
        <div class="legend">
          <div class="legend-row"><kbd>1</kbd>–<kbd>9</kbd> <span>throw height</span></div>
          <div class="legend-row"><kbd>←</kbd> / <kbd>→</kbd> <span>which hand throws</span></div>
          <div class="legend-row"><kbd>click</kbd> <span>left/right side throws from that hand</span></div>
          <div class="legend-row"><kbd>R</kbd> <span>reset</span></div>
        </div>
      </section>

      <footer class="readout">
        <div class="readout-cell"><label>last throw</label><span id="last-throw">—</span></div>
        <div class="readout-cell"><label>airborne</label><span id="airborne">0</span></div>
        <div class="readout-cell"><label>L hand</label><span id="left-count">0</span></div>
        <div class="readout-cell"><label>R hand</label><span id="right-count">0</span></div>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
